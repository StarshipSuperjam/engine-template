# secret-scan — the committed open-source secret-scan floor that travels to every repo.
# (control-plane "The security floor", Secrets pillar: a committed open-source secret-scan
# CI workflow — DISTINCT from GitHub's own native secret scanning — runs on every pull
# request regardless of repository plan or visibility. The git-native floor that travels:
# real protection on a free private repo.)
#
# ADVISORY, never a merge gate. The job name `secret-scan` is deliberately NOT in the
# branch ruleset's required-check list (protection_guard.REQUIRED_CHECKS = engine-ci,
# engine-guard), so a finding is SURFACED for the Engine to address but can never block a
# merge a non-engineer cannot clear (control-plane: alerts are advisory, not a merge gate).
# Where the repository's tier supports it, GitHub's native secret scanning and push
# protection UPGRADE this — they are enabled by the security-floor toggles in a later
# slice, not here.
#
# Runs the open-source gitleaks binary DIRECTLY (no third-party Action, no organization
# license), pinned to a specific release, so the scan is fully self-contained and free on
# any plan or visibility. The pinned version matches tools/demo_secret_scan.py.
name: secret-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install gitleaks (pinned)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Scan the working tree for committed secrets (advisory — warns, never blocks)
        run: |
          ./gitleaks dir . --no-banner --redact --exit-code 1 \
            || { echo "::warning::A possible secret was found. This is a WARNING only — it does not block your merge. Review the finding above and remove the secret if it is real."; exit 1; }
