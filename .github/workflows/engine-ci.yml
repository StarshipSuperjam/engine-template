# engine-ci — the seed's required validator check (required check #1).
# Materializes the engine tool-runtime, then runs the seed validator (PR-body
# completeness + link/file integrity) and the protection-detection guard.
# The job name `engine-ci` is the FROZEN check context bound in the branch
# ruleset; renaming it is a guardrail-weakening change (stage-0-harness §4).
name: engine-ci

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  engine-ci:
    name: engine-ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up uv (pinned)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.8"
      - name: Materialize the engine tool-runtime
        run: uv sync --directory .engine --frozen
      - name: Run the seed validator (CI suite)
        # The validator reads the PR body from $GITHUB_EVENT_PATH (.pull_request.body),
        # never from an interpolated shell argument.
        run: uv run --directory .engine --frozen -- python tools/validate.py --suite CI
      - name: Run the seed self-tests (the checker-of-checkers)
        run: uv run --directory .engine --frozen -- python -m unittest discover -s tools -p 'test_*.py'
      - name: Protection-detection guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROTECTED_BRANCH: main
        run: uv run --directory .engine --frozen -- python tools/protection_guard.py
