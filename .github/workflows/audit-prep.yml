# audit-prep — the engine's scheduled self-review (audit-library). It runs the read-only `audit` persona
# on a recurring schedule, then commits the plain-language digest it produces (plus an auto-refreshed
# where-we-stand cache) back as an ordinary pull request for the operator to read and merge.
#
# PRESENT-BUT-INERT UNTIL ARMED. The workflow ships committed in every repo, but the self-review only RUNS
# once the operator does the one-time setup (a `CLAUDE_CODE_OAUTH_TOKEN` secret). With no token set, the
# `gate` job skips the run cleanly — it never fails red — so an un-set-up repo never accumulates failing runs.
# Because the workflow is committed from day one, the digest-staleness signal has a baseline to measure
# against: a self-review that is missing, stopped, or never set up is surfaced on the operator's return.
#
# NOT EXERCISED END-TO-END DURING TEMPLATE CONSTRUCTION. This construction repo holds no subscription token,
# and committing back needs a deployed repo — so this file is validated by its
# GRAMMAR (the actionlint workflow lints it) and by read-review, NOT by a run. The plumbing it calls — the
# digest seal and the offline-cache refresh — IS unit-tested and demoed. That the scheduled run itself
# produces a digest is confirmed the first time an operator arms it (the same maturity honesty the project
# applies to its other v1-shipped-but-undogfooded paths).
#
# THE PERSONA STAYS READ-ONLY — THE WORKFLOW COMMITS. The `audit` persona only reads and reports; it never
# writes. The sealing, the cache refresh, and the git + pull-request steps below are the WORKFLOW's, kept
# separate from the persona, which is why this runs `claude` directly rather than an action that would let
# the agent do the commit itself.
#
# CADENCE is the one cron line below (`17 7 * * 0` = weekly, Sundays 07:17 UTC). GitHub requires the schedule
# to be written here literally — it cannot be read from a setting — so to change how often the self-review
# runs, edit that one line (cron's five fields are minute hour day-of-month month day-of-week; e.g.
# `17 7 1 * *` is monthly). A too-frequent cadence can run into the subscription's usage limits, so lengthen it
# rather than shorten it if unsure. On a public repo GitHub disables a schedule after 60 idle days; a commit or
# `gh workflow enable` re-arms it, and the staleness signal says so if it lapses.
name: audit-prep

on:
  schedule:
    - cron: "17 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Read-only access to the engine-labelled issue backlog (the debt register) so the workflow can fetch it
  # for the self-review's concern #2 and feed it to the read-only persona. The persona never gets a GitHub
  # token; this scope serves the workflow's own fetch step (and the offline-cache refresh, which reads the
  # same open-issue count).
  issues: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    outputs:
      armed: ${{ steps.armed.outputs.armed }}
    steps:
      # Secrets cannot be read in a job-level `if:`, so a gate step reads the token into an env var and
      # writes an `armed` output; the real job below is gated on that output. This is the skip-clean-when-
      # unarmed pattern: no token -> the self-review is simply not set up yet, and the run ends green.
      - name: Is the self-review armed?
        id: armed
        env:
          AUDIT_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${AUDIT_TOKEN}" ]; then
            echo "armed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "armed=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::The scheduled self-review is not set up yet (no CLAUDE_CODE_OAUTH_TOKEN secret). Skipping cleanly — nothing failed."
          fi

  audit:
    name: audit
    needs: gate
    if: needs.gate.outputs.armed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up uv (pinned)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.8"
      - name: Materialize the engine tool-runtime
        run: uv sync --directory .engine --frozen
      - name: Install the Claude Code CLI (pinned)
        env:
          CLAUDE_CODE_VERSION: "2.1.176"
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
      - name: Fetch the open engine-labelled issues for the self-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Concern #2 of the self-review judges the engine-labelled issue backlog (the debt register), which
          # lives on GitHub, not in the checkout. The read-only persona never reaches GitHub itself, so the
          # workflow fetches the backlog here (the telemetry boundary owns the issue view) and the next step
          # feeds it into the persona's prompt. The verb reports a read failure in-band (never a silent
          # empty); if the fetch step itself fails, leave an honest marker so the persona still discloses the
          # gap rather than silently skipping concern #2.
          if ! uv run --directory .engine --frozen -- python tools/telemetry.py engine-issues \
                 > "${RUNNER_TEMP}/engine-issues.md"; then
            printf '%s\n' "OPEN ENGINE-LABELLED ISSUES (the debt register): could not be read this run (the fetch step failed). Treat concern #2 as unreviewed and say so plainly in your digest." \
              > "${RUNNER_TEMP}/engine-issues.md"
          fi
      - name: Run the read-only self-review and capture its plain-language digest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # AUDIT_MODEL is the model the engine uses to judge its OWN health. The default is `opus` (the
          # current most-capable model). You may override it with a repository variable named AUDIT_MODEL
          # (Settings -> Variables) — for example to move to a newer model. Choosing a cheaper or weaker
          # model gives you a LESS trustworthy self-review, and a mistyped name fails this run the same
          # quiet way a mistyped secret does, so change it deliberately.
          AUDIT_MODEL: ${{ vars.AUDIT_MODEL || 'opus' }}
        run: |
          set -euo pipefail
          # Feed the fetched engine-issue backlog (prior step) into the persona's prompt so it can work
          # concern #2 — the persona stays read-only and never reaches GitHub itself. The backlog is expanded
          # inside double quotes, so any issue content is passed verbatim and safely (no shell re-parsing).
          backlog="$(cat "${RUNNER_TEMP}/engine-issues.md")"
          prompt="Run your self-review of this project's engine now. Output ONLY the plain-language digest — what you looked at, what you found, and what you recommend — with no preamble.

          For concern #2 (the engine-labelled issue backlog / debt register), you cannot reach GitHub yourself; the COMPLETE set of currently-open engine-labelled issues was fetched for you (read to exhaustion; a read failure would appear in-band, never a silently short list) and follows between the markers. Treat it as the whole open backlog, not a sample, and judge it as part of your review.
          ----- BEGIN OPEN ENGINE-LABELLED ISSUES -----
          ${backlog}
          ----- END OPEN ENGINE-LABELLED ISSUES -----"
          claude -p \
            --agent audit \
            --model "${AUDIT_MODEL}" \
            "${prompt}" \
            > "${RUNNER_TEMP}/audit-digest-body.md"
      - name: Seal the digest with its run-date
        run: |
          set -euo pipefail
          uv run --directory .engine --frozen -- python tools/audit_digest.py \
            seal audits/audit-digest.md \
            --body-file "${RUNNER_TEMP}/audit-digest-body.md"
      - name: Refresh the committed where-we-stand snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run --directory .engine --frozen -- python tools/telemetry.py refresh
      - name: Open the digest pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          git config user.name "engine self-review"
          git config user.email "engine-self-review@users.noreply.github.com"
          stamp="$(date -u +%Y-%m-%d)"
          # Collision-proof branch name (round-2 finding 4): the run id + attempt are unique per run, so a
          # leftover branch from a failed earlier run can never block this run's push with a non-fast-forward
          # error. No force-push is needed, and the protected-branch deletion guard (scoped to the default
          # branch only) is never engaged.
          branch="audit-prep/${stamp}-${RUN_ID}-${RUN_ATTEMPT}"
          git checkout -b "${branch}"
          git add .engine/audits/audit-digest.md .engine/state/state.json
          if git diff --cached --quiet; then
            echo "::notice::The self-review produced no changes to commit."
            exit 0
          fi
          git commit -m "Engine self-review digest (${stamp})"
          git push --set-upstream origin "${branch}"
          # The pull-request body IS the self-review itself — the digest prose with its sealed front-matter
          # stripped — so the operator reads the actual review here, not boilerplate. A short footer then
          # keeps the load-bearing framing: a where-we-stand snapshot rides along, and the merge attests to
          # the review, not to the auto-derived numbers.
          uv run --directory .engine --frozen -- python tools/audit_digest.py body audits/audit-digest.md \
            > "${RUNNER_TEMP}/pr-body.md"
          cat >> "${RUNNER_TEMP}/pr-body.md" <<'EOF'

          ---

          ### About this pull request

          The summary above is the engine's own self-review — what it looked at, what it found, and what it
          recommends, for you to read and act on. This pull request also carries an automatically-refreshed
          snapshot of where the project stands (the open-items count and the milestone/phase markers); those
          numbers are derived mechanically and always carry the date they were taken, so you are NOT being
          asked to vouch for them — your merge attests to the self-review above, not to the snapshot.

          Merge this to record the self-review, or close it to skip this cycle. Nothing here changes any of
          your settings.
          EOF
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Engine self-review digest (${stamp})" \
            --body-file "${RUNNER_TEMP}/pr-body.md"
